<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:#70c5ce;overflow:hidden;font-family:Arial,sans-serif}
#game{border:4px solid white;background:linear-gradient(#70c5ce,#b8f3ff)}
#score{position:absolute;top:20px;font-size:32px;color:white;font-weight:bold}
</style>
</head>
<body>
<div id="score">0</div>
<canvas id="game" width="400" height="600"></canvas>
<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const scoreEl=document.getElementById("score");
let bird={x:80,y:250,width:30,height:30,velocity:0,gravity:0.5,jump:-8};
let pipes=[]; let score=0; let gameOver=false;
function createPipe(){
 let gap=150; let topHeight=Math.random()*250+50;
 pipes.push({x:canvas.width,top:topHeight,bottom:topHeight+gap,passed:false});
}
createPipe();
document.addEventListener("keydown",()=>{if(gameOver) location.reload(); bird.velocity=bird.jump;});
canvas.addEventListener("click",()=>{if(gameOver) location.reload(); bird.velocity=bird.jump;});
function drawBird(){ctx.fillStyle="yellow";ctx.beginPath();ctx.arc(bird.x+15,bird.y+15,15,0,Math.PI*2);ctx.fill();}
function drawPipes(){
 ctx.fillStyle="green";
 pipes.forEach(pipe=>{
  ctx.fillRect(pipe.x,0,60,pipe.top);
  ctx.fillRect(pipe.x,pipe.bottom,60,canvas.height-pipe.bottom);
 });
}
function update(){
 if(gameOver) return;
 bird.velocity+=bird.gravity; bird.y+=bird.velocity;
 if(bird.y<0||bird.y+bird.height>canvas.height) gameOver=true;
 pipes.forEach(pipe=>{
  pipe.x-=3;
  if(bird.x+bird.width>pipe.x&&bird.x<pipe.x+60&&(bird.y<pipe.top||bird.y+bird.height>pipe.bottom)) gameOver=true;
  if(!pipe.passed&&pipe.x+60<bird.x){score++;scoreEl.textContent=score;pipe.passed=true;}
 });
 pipes=pipes.filter(pipe=>pipe.x>-60);
 if(pipes.length===0||pipes[pipes.length-1].x<220) createPipe();
}
function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 drawBird(); drawPipes();
 if(gameOver){
  ctx.fillStyle="red"; ctx.font="40px Arial"; ctx.fillText("GAME OVER",60,280);
  ctx.font="20px Arial"; ctx.fillText("Press Space or Click",95,320);
 }
}
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
